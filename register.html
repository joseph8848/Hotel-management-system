<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/shared/login.css" />
    <script src="assets/js/shared/mockData.js" defer></script>
    <script src="assets/js/shared/main.js" defer></script>
    <title>Create Account - Champion Hotel</title>
  </head>
  <body class="page-login">
    <div class="background"></div>

    <img src="Champion hotel logo.png" alt="Champion Hotel Logo" class="logo" />

    <div class="login-container">
      <div class="login-card">
        <!-- Portal Title -->
        <div class="portal-header">
          <h2 id="portal-title">Create Account</h2>
          <p id="portal-desc">Join Champion Hotel for exclusive benefits</p>
        </div>

        <div id="form-alert" class="form-alert"></div>

        <!-- Form -->
        <form action="customer-dashboard.html" method="GET" class="register-form" id="register-form">
          <input
            type="text"
            name="fullname"
            id="fullname"
            placeholder="Full Name"
            required
          />
          <span class="input-error" id="fullname-error" role="alert"></span>
          
          <input type="email" name="email" id="email" placeholder="Email Address" required />
          <span class="input-error" id="email-error" role="alert"></span>
          
          <input type="tel" name="phone" id="phone" placeholder="Phone Number" required />
          <span class="input-error" id="phone-error" role="alert"></span>

          <div class="password-field">
            <input type="password" name="password" id="password" placeholder="Password" required />
            <button
              type="button"
              id="toggle-password"
              class="toggle-password"
              aria-label="Show password"
              aria-pressed="false"
            ></button>
          </div>
          <span class="input-error" id="password-error" role="alert"></span>
          
          <div class="password-field" style="margin-top: 15px;">
            <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required />
          </div>
          <span class="input-error" id="confirm-password-error" role="alert"></span>

          <button type="submit" id="register-btn" style="margin-top: 20px;">Create Account</button>
          <p class="register" id="login-link">Already have an account? <a href="login.html">Sign In</a></p>
        </form>
      </div>

      <!-- Social Panel -->
      <div class="social-panel" aria-label="Social sign-in options">
        <h3 class="social-title">Quick Sign-Up</h3>
        <p class="social-desc">Use a social account to register faster. No posts will be made.</p>
        <div class="social-login">
          <div class="social-separator">
            <span>or continue with</span>
          </div>
          <button type="button" class="social-btn google" onclick="window.location.href='customer-dashboard.html'">
            <svg
              class="icon google-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 48 48"
              aria-hidden="true"
            >
              <path fill="#EA4335" d="M24 9.5c4.1 0 7.8 1.6 10.6 4.1l6.5-6.5C36.5 2.8 30.6 0 24 0 14.6 0 6.4 5.4 2.5 13.2l7.7 6c2.1-6.1 7.9-9.7 13.8-9.7z"/>
              <path fill="#FBBC05" d="M46.5 24c0-2.3-.3-4.5-.9-6.6H24v12.5h12.6c-.6 3.3-2.6 6.1-5.6 8l7.2 5.6c6.2-5.7 8.3-14.1 8.3-19.5z"/>
              <path fill="#34A853" d="M10.2 28.2c-1-2.8-1-5.7 0-8.4l-7.7-6C.9 17.1 0 20.5 0 24c0 3.5.9 6.9 2.5 10l7.7-5.8z"/>
              <path fill="#4285F4" d="M24 48c6.5 0 12.4-2.4 16.9-6.8L33.7 35.6c-2.6 1.8-6 2.8-9.7 2.8-5.9 0-11.6-3.6-13.8-9.7l-7.7 6C6.4 42.6 14.6 48 24 48z"/>
            </svg>
            <span>Sign up with Google</span>
          </button>
          <button type="button" class="social-btn facebook" onclick="window.location.href='customer-dashboard.html'">Proceed with Facebook</button>
          <button type="button" class="social-btn apple" onclick="window.location.href='customer-dashboard.html'">Proceed with Apple</button>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-surface">
        <p>© 2025 Champion Hotel | Premier Luxury Hotel Management</p>
        <div class="footer-links" aria-label="Helpful footer links">
          <a href="terms.html" class="footer-link">Privacy &amp; Security</a>
          <span class="footer-sep">•</span>
          <a href="contact.html" class="footer-link">24/7 Support</a>
        </div>
      </div>
    </footer>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('register-form');
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const pwd = document.getElementById('password').value;
          const confirmPwd = document.getElementById('confirm_password').value;
          if (pwd !== confirmPwd) {
            const err = document.getElementById('confirm-password-error');
            err.textContent = 'Passwords do not match';
            document.getElementById('confirm_password').classList.add('invalid');
            return;
          }
          showToast('Registration successful! Redirecting to dashboard...', 'success');
          setTimeout(() => {
            window.location.href = 'customer-dashboard.html';
          }, 1500);
        });

        // Clear error on input
        document.getElementById('confirm_password').addEventListener('input', function() {
          this.classList.remove('invalid');
          document.getElementById('confirm-password-error').textContent = '';
        });
      });
    </script>
  </body>
</html>

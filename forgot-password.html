<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/shared/login.css" />
    <script src="assets/js/shared/mockData.js" defer></script>
    <script src="assets/js/shared/main.js" defer></script>
    <title>Forgot Password - Champion Hotel</title>
  </head>
  <body class="page-login">
    <div class="background"></div>

    <img src="Champion hotel logo.png" alt="Champion Hotel Logo" class="logo" />

    <div class="login-container">
      <div class="login-card">
        <!-- Portal Title -->
        <div class="portal-header">
          <h2 id="portal-title">Reset Password</h2>
          <p id="portal-desc">Enter your email to receive a password reset link.</p>
        </div>

        <div id="form-alert" class="form-alert"></div>

        <!-- Form -->
        <form action="#" method="POST" class="login-form" id="reset-form">
          <input type="email" name="email" id="email" placeholder="Email Address" required />
          <span class="input-error" id="email-error" role="alert"></span>

          <button type="submit" id="reset-btn" style="margin-top: 20px;">Send Reset Link</button>
          <p class="register" id="login-link">Remembered your password? <a href="login.html">Sign In</a></p>
        </form>
      </div>
    </div>

    <footer>
      <div class="footer-surface">
        <p>© 2025 Champion Hotel | Premier Luxury Hotel Management</p>
        <div class="footer-links" aria-label="Helpful footer links">
          <a href="terms.html" class="footer-link">Privacy &amp; Security</a>
          <span class="footer-sep">•</span>
          <a href="contact.html" class="footer-link">24/7 Support</a>
        </div>
      </div>
    </footer>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('reset-form');
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.getElementById('email').value;
          if (typeof showToast === 'function') {
            showToast(`Password reset link sent to ${email}`, 'success');
          } else {
            const alertBox = document.getElementById('form-alert');
            alertBox.textContent = `A password reset link has been sent to ${email}. Please check your inbox.`;
            alertBox.style.display = 'block';
            alertBox.style.backgroundColor = '#d4edda';
            alertBox.style.color = '#155724';
            alertBox.style.padding = '10px';
            alertBox.style.borderRadius = '4px';
            alertBox.style.marginBottom = '20px';
          }
          form.reset();
        });
      });
    </script>
  </body>
</html>

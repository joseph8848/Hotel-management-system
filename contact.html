<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&family=Cinzel:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/design-system.css" />
    <link rel="stylesheet" href="assets/css/landing.css" />
    <title>Contact Us - Champion Hotel</title>
    <style>
      .page-content {
        padding: 120px 0 60px;
        min-height: calc(100vh - 300px);
      }
      .page-header {
        text-align: center;
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="main-nav" style="background: var(--surface-1);">
      <div class="nav-container">
        <div class="nav-brand">
          <img src="Champion hotel logo.png" alt="Champion Hotel Logo" class="nav-logo" />
          <span class="nav-title">Champion Hotel</span>
        </div>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="booking.html" class="nav-link">Book Now</a></li>
        </ul>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="page-content container">
      <div class="page-header">
        <h1 class="heading-2">Contact Us</h1>
        <p class="body-large">We're here to assist you 24/7</p>
      </div>

      <div class="contact-grid">
        <div class="contact-info">
          <div class="contact-item">
            <span class="contact-icon">📍</span>
            <div class="contact-details">
              <h3 class="heading-5">Location</h3>
              <p class="body-base">Nairobi City Centre<br>Tom Mboya Street, Kenya</p>
            </div>
          </div>
          <div class="contact-item">
            <span class="contact-icon">📞</span>
            <div class="contact-details">
              <h3 class="heading-5">Phone</h3>
              <p class="body-base">+254 735 678 390</p>
            </div>
          </div>
          <div class="contact-item">
            <span class="contact-icon">✉️</span>
            <div class="contact-details">
              <h3 class="heading-5">Email</h3>
              <p class="body-base">info@championhotel.com</p>
            </div>
          </div>
        </div>

        <div class="contact-form-container card">
          <h3 class="heading-4">Send us a message</h3>
          <form class="contact-form" id="contact-form" onsubmit="event.preventDefault(); if(typeof showToast==='function'){showToast('Message sent successfully! Our team will get back to you shortly.', 'success');}else{alert('Message sent successfully!');} this.reset();">
            <div class="form-group">
              <label class="form-label">Name</label>
              <input type="text" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label">Subject</label>
              <input type="text" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label">Message</label>
              <textarea class="form-textarea" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Send Message</button>
          </form>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
      <div class="container">
        <div class="footer-bottom" style="border: none;">
          <p class="body-small">© 2025 Champion Hotel Management System. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
